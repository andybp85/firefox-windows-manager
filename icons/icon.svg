        <polyline points="14,38 32,50 50,38"/>
        <polyline points="14,22 32,34 50,22"/>
    </g>
    <polyline points="14,12 32,20 50,12" fill="none" stroke="#e8631c" stroke-width="5" stroke-linejoin="miter"/>
</svg>
