<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
    <rect x="2" y="2" width="60" height="60" rx="13" fill="#3e1267"/>
    <!-- stacked double-chevron frieze (pointing down), echoing the dashboard's Grand Salon chevron register -->
